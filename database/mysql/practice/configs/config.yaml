# =============================================================================
# MySQL 配置
# =============================================================================
# 命名规范：snake_case（Go 社区 yaml 配置惯例）
# 敏感字段：password 等敏感信息生产环境通过环境变量 MYSQL_PASSWORD 覆盖
# =============================================================================

mysql:
  # ---------------------------------------------------------------------------
  # 连接信息
  # ---------------------------------------------------------------------------
  host: 127.0.0.1
  port: 13306
  user: root
  password: ${MYSQL_PASSWORD:root}       # 生产环境通过环境变量覆盖，默认值 root 仅限开发
  dbname: guide_db
  charset: utf8mb4                       # 支持 emoji 和全量 unicode
  timezone: Local                        # 时区：Local 跟随系统，生产可设 Asia/Shanghai
  parse_time: true                       # 将 MySQL DATETIME 解析为 Go time.Time

  # ---------------------------------------------------------------------------
  # 连接池
  # ---------------------------------------------------------------------------
  # max_open_conns: 最大打开连接数
  #   计算方式：(MySQL max_connections) / (应用实例数)，留一定余量
  #   示例：MySQL max_connections=500，部署 4 个 Pod → 每个 Pod 约 100
  max_open_conns: 100

  # max_idle_conns: 最大空闲连接数
  #   建议为 max_open_conns 的 10%-25%，太大浪费内存，太小频繁建连
  max_idle_conns: 10

  # conn_max_lifetime: 连接最大存活时间（秒）
  #   必须小于 MySQL wait_timeout（默认 28800s=8h），建议 1h
  #   防止使用已被 MySQL 端关闭的连接
  conn_max_lifetime: 3600

  # conn_max_idle_time: 空闲连接最大存活时间（秒）
  #   超时的空闲连接会被回收，防止连接池中堆积无效连接
  conn_max_idle_time: 600

  # ---------------------------------------------------------------------------
  # 日志
  # ---------------------------------------------------------------------------
  # log_level: GORM 日志级别
  #   silent - 不打印
  #   error  - 只打印错误
  #   warn   - 打印错误 + 慢 SQL
  #   info   - 打印所有 SQL（仅限开发环境）
  log_level: info

  # slow_threshold: 慢查询阈值（毫秒）
  #   超过该时间的 SQL 会以 WARN 级别打印，方便排查性能问题
  slow_threshold: 200
